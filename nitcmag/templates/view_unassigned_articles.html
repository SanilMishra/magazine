{% extends 'admin_dash_base.html' %}

{% block title %}Unassigned Articles{% endblock %}

{% block body %}
    <table class="caption">
        <thead>
            <tr style="color: white;">
                <th>Article ID</th>
                <th>Title</th>
                <th>Author</th>
            </tr>
        </thead>
        <tbody>
            {% for article in articles %}
            <tr style="color: white;">
                <td>{{ article.article_id }}</td>
                <td><a href="#">{{article.title }}</a></td>
                <td>{{ article.author }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
{% endblock %}
